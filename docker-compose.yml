services:
  backend:
    image: ghcr.io/swaeltjie/feednest-backend:1.0.0
    ports:
      - "8082:8080"
    volumes:
      - feednest-data:/data
    environment:
      - DB_PATH=/data/feednest.db
      - JWT_SECRET=${JWT_SECRET:-}
      - PORT=8080
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,https://feednest.byteden.cc}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    image: ghcr.io/swaeltjie/feednest-frontend:1.0.0
    ports:
      - "3000:3000"
    environment:
      - ORIGIN=${ORIGIN:-https://feednest.byteden.cc}
      - PORT=3000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  feednest-data:

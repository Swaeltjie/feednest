services:
  backend:
    build: ./backend
    ports:
      - "8082:8080"
    volumes:
      - feednest-data:/data
    environment:
      - DB_PATH=/data/feednest.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - PORT=8080
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - ORIGIN=http://localhost:3000
      - PORT=3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  feednest-data:

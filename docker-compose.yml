services:
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:8082:8080"
    volumes:
      - feednest-data:/data
    environment:
      - DB_PATH=/data/feednest.db
      - JWT_SECRET=${JWT_SECRET:-}
      - PORT=8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - ORIGIN=${ORIGIN:-http://localhost:3000}
      - PORT=3000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  feednest-data:
